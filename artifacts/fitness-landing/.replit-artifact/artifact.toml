kind = "web"
previewPath = "/fitness-landing/"
title = "BH Labs Fitness & Sports Club Landing Page"
version = "1.0.0"
id = "artifacts/fitness-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/fitness-landing/" ]
localPort = 19505

[services.development]
run = "pnpm --filter @workspace/fitness-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-landing", "run", "build" ]
publicDir = "artifacts/fitness-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19505"
BASE_PATH = "/fitness-landing/"
